name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Pin npm to match local (lockfile resolution 일치)
        run: npm install -g npm@11

      - run: npm ci

      - name: Lint
        run: npm run lint
